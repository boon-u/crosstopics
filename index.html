<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Journey Board — Cerner CIS</title>
<style>
  :root{
    --ink:#0f172a; --muted:#64748b;
    --reg-bg:#DBEAFE; --ed-bg:#FEE2E2; --lab-bg:#DCFCE7;
    --di-bg:#EDE9FE; --nur-bg:#CCFBF1; --mha-bg:#FFEDD5;
    --ems-bg:#CFFAFE; --peri-bg:#FCE7F3; --prov-bg:#FEF3C7;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background-color:#fbfbfd;
    background-image:radial-gradient(#dbe2ea 1.4px, transparent 1.4px);
    background-size:26px 26px;
    padding:30px 22px 46px;
  }
  .wrap{max-width:1360px;margin:0 auto}
  h1{font-size:32px;margin:0 0 4px;letter-spacing:-.5px}
  .tag{color:var(--muted);font-size:15px;margin:0 0 18px}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:0 0 22px}
  .lg{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#334155;
      background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:5px 12px 5px 8px;
      box-shadow:0 1px 2px rgba(15,23,42,.05)}
  .dot{width:14px;height:14px;border-radius:5px}
  .scn{background:#ffffffcc;border:1px solid #eef2f7;border-radius:20px;
       padding:14px 16px 16px;margin:0 0 18px;box-shadow:0 6px 20px rgba(15,23,42,.05)}
  .scn h2{font-size:18px;margin:2px 0 1px}
  .scn .sub{color:var(--muted);font-size:12.5px;margin:0 0 8px}
  .flow{position:relative;width:100%;overflow:visible}
  .canvas{position:relative}
  svg.links{position:absolute;inset:0;overflow:visible;pointer-events:none}
  .note{position:absolute;border-radius:15px;padding:11px 11px 10px;
        box-shadow:0 8px 15px rgba(15,23,42,.12);
        display:flex;flex-direction:column;gap:3px;
        transition:transform .18s ease, box-shadow .18s ease;}
  .note:hover{transform:translateY(-4px) rotate(0deg) scale(1.04)!important;
              box-shadow:0 14px 26px rgba(15,23,42,.20);z-index:5}
  .note .emj{line-height:1.05}
  .note .lbl{font-weight:700;line-height:1.2}
  .note .enc{font-style:italic;opacity:.85;line-height:1.2}
  .note .meta{opacity:.9;line-height:1.25;margin-top:1px}
  .note .pill{align-self:flex-start;margin-top:auto;font-weight:800;
              letter-spacing:.3px;color:#fff;border-radius:999px;padding:3px 8px}
  .hint{color:var(--muted);font-size:12px;margin:18px 0 0;text-align:center;font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <h1>🗺️ Patient Journey Board</h1>
  <p class="tag">Cerner CIS · registration → discharge · seven realistic paths across the team's streams</p>
  <div class="legend" id="legend"></div>
  <div id="board"></div>
  <p class="hint">Hover any sticky note to lift it. Each lane is one patient's journey; wavy arrows show the hand-off from step to step.</p>
</div>
<script>
const STREAM = {
  Reg:{bg:'var(--reg-bg)',ac:'#1D4ED8',name:'Registration & Scheduling',facilitator:'Boon'},
  ED:{bg:'var(--ed-bg)',ac:'#DC2626',name:'Emergency (ED)',facilitator:'Via'},
  Lab:{bg:'var(--lab-bg)',ac:'#15803D',name:'Lab',facilitator:'Bode'},
  DI:{bg:'var(--di-bg)',ac:'#6D28D9',name:'Diagnostic Imaging',facilitator:'Harjot'},
  Nursing:{bg:'var(--nur-bg)',ac:'#0F766E',name:'Nursing',facilitator:'Via'},
  MHA:{bg:'var(--mha-bg)',ac:'#C2410C',name:'Mental Health & Addictions',facilitator:'Allan'},
  EMS:{bg:'var(--ems-bg)',ac:'#0891B2',name:'EMS / Paramedic',facilitator:'TBD'},
  Peri:{bg:'var(--peri-bg)',ac:'#DB2777',name:'Perioperative (OR)',facilitator:'TBD'},
  Provider:{bg:'var(--prov-bg)',ac:'#B45309',name:'Providers',facilitator:'Mahak'},
};
const SCENARIOS = [
  {title:'Scheduled Ambulatory Workup', sub:'Outpatient · Single appointment',
   steps:[['📅','Book appointment','Outpatient · Single','Reg','SchAppBook'],
          ['📝','Register / check-in','Outpatient','Reg','SchAppBook'],
          ['🩺','Clinic visit + orders','Outpatient','Nursing','PowerChart'],
          ['🩸','Bloodwork','Lab','Lab','Department Order Entry'],
          ['🩻','Chest X-ray','DI','DI','Department Order Entry'],
          ['🏡','Review & discharge','Outpatient','Provider']]},
  {title:'Recurring Infusion Therapy', sub:'Outpatient in a Bed · Recurring',
   steps:[['📅','Book series','Recurring','Reg','SchAppBook'],
          ['🪪','Check-in','Outpatient in a Bed','Reg','SchAppBook'],
          ['🩸','Pre-infusion bloodwork','Lab','Lab','Department Order Entry'],
          ['💉','Infusion in bed','Outpatient in a Bed','Nursing','PowerChart'],
          ['📈','Monitor & discharge','Outpatient in a Bed','Nursing','PowerChart'],
          ['🔁','Next visit (recurring)','Recurring','Reg','SchAppBook']]},
  {title:'Mental Health Crisis via ED', sub:'Emergency converts to Inpatient (MHA unit)',
   steps:[['🚑','Register','Emergency','Reg','FirstNet'],
          ['🛟','Triage & safety','Emergency','ED','PowerChart'],
          ['🧪','Tox / bloodwork','Lab','Lab','Department Order Entry'],
          ['💬','MHA consult','Emergency','MHA','PowerChart'],
          ['🛏️','Admit (convert)','Emergency → Inpatient','MHA','PowerChart'],
          ['🏥','MHA inpatient care','Inpatient','MHA','PowerChart'],
          ['🏡','Discharge + follow-up','Inpatient','MHA','PowerChart']]},
  {title:'MHA Outpatient Group Program', sub:'Outpatient · Group Session',
   steps:[['📩','Referral & booking','Group Session','Reg','SchAppBook'],
          ['📝','Register','Outpatient','Reg','PM Office'],
          ['👥','Group therapy session','Outpatient','MHA','PowerChart'],
          ['🔁','Recurring group series','Group Session','MHA','PowerChart'],
          ['✅','Program discharge','Outpatient','MHA','PowerChart']]},
  {title:'Standalone Lab & DI (order-driven)', sub:'Lab + DI · Single',
   steps:[['📄','GP requisition','Single','Reg','PM Office'],
          ['📝','Register','Lab / DI','Reg','PM Office'],
          ['🩸','Bloodwork','Lab','Lab','Department Order Entry'],
          ['🫧','Ultrasound','DI','DI','Department Order Entry'],
          ['📤','Results to provider','Lab / DI','Reg','PowerChart'],
          ['🏡','Discharge','Lab / DI','Reg','PM Office']]},
  {title:'MVA Trauma — Emergency Surgery → Elective Return', sub:'Pre-hospital → Emergency → Inpatient → OR → (later) Day Surgery',
   wrapAfter:5,
   steps:[['🚑','Pre-arrival & trauma activation','Pre-hospital','EMS'],
          ['🚨','Trauma bay + documentation','Emergency','ED'],
          ['🧾','Order entry: Lab / Imaging','Emergency','ED'],
          ['🩸','Specimen collection','Lab','Lab'],
          ['🩻','Trauma imaging (CT)','DI','DI'],
          ['💊','Medication administration','Emergency','Nursing'],
          ['🛏️','Admission: CapMan · PAO · handover','Emergency → Inpatient','Reg'],
          ['🏥','Inpatient care + documentation','Inpatient','Nursing'],
          ['✅','Pre-op checklist','Inpatient','Nursing'],
          ['🔪','Emergency surgery','Inpatient · OR','Peri'],
          ['😴','PACU','Inpatient','Peri'],
          ['🛌','Post-op inpatient care','Inpatient','Nursing'],
          ['🏡','Discharge (returns for elective)','Inpatient','Reg'],
          ['📅','Book elective surgery','Day Surgery · Single','Reg'],
          ['🔧','Elective day surgery','Day Surgery · pre-op→PACU','Peri']]},
];
function rng(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;};}
function rowLens(sc){
  if(!sc.wrapAfter) return [sc.steps.length];
  const rows=[]; for(let i=0;i<sc.steps.length;i+=sc.wrapAfter) rows.push(Math.min(sc.wrapAfter, sc.steps.length-i));
  return rows;
}
const MAXN = Math.max(...SCENARIOS.flatMap(rowLens));

const leg=document.getElementById('legend');
for(const k in STREAM){const s=STREAM[k];
  leg.insertAdjacentHTML('beforeend',
    `<span class="lg"><span class="dot" style="background:${s.ac}"></span>${k} — ${s.name}</span>`);}

const board=document.getElementById('board');

function drawArrow(svg, x1,y1,x2,y2, col, rand){
  const dx=x2-x1, dy=y2-y1;
  const wob=(rand()*40-20);
  const cx1=x1+dx*0.42, cy1=y1+(dy?dy*0.2:0)+wob, cx2=x2-dx*0.42, cy2=y2-(dy?dy*0.2:0)-wob;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2-8} ${y2}`);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',col); path.setAttribute('stroke-width','2.4');
  path.setAttribute('stroke-linecap','round'); path.setAttribute('opacity','0.72');
  svg.appendChild(path);
  const ang=Math.atan2(y2-cy2,(x2-8)-cx2), ah=8, axp=x2-3, ayp=y2;
  const tri=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  tri.setAttribute('points',`${axp} ${ayp}, ${axp-ah*Math.cos(ang-0.5)} ${ayp-ah*Math.sin(ang-0.5)}, ${axp-ah*Math.cos(ang+0.5)} ${ayp-ah*Math.sin(ang+0.5)}`);
  tri.setAttribute('fill',col); tri.setAttribute('opacity','0.85');
  svg.appendChild(tri);
}

function render(){
  board.innerHTML='';
  const pad=8;
  const avail=Math.max(360, board.clientWidth - 34);
  let cardW=(avail - 2*pad - (MAXN-1)*Math.max(12, avail*0.018)) / MAXN;
  cardW=Math.max(96, Math.min(158, cardW));
  // room for emoji + title + encounter + facilitator + app + stream pill
  const cardH=Math.max(168, Math.round(cardW*1.22));
  const topPad=44;          // clear space above cards for arrow heads
  const bottomPad=28;
  const oscil=Math.round(cardH*0.38);
  const rowH=topPad + cardH + oscil + bottomPad;
  const rowGap=56;          // breathing room for the wrap ribbon + arrow head
  const fEmj=Math.round(cardW*0.17), fLbl=Math.max(11, cardW*0.09),
        fEnc=Math.max(9.5, cardW*0.068), fMeta=Math.max(9, cardW*0.062),
        fPill=Math.max(8.5, cardW*0.058);

  SCENARIOS.forEach((sc,si)=>{
    const rows=rowLens(sc);
    const nRows=rows.length;
    const W=avail;
    const H=nRows*rowH + (nRows-1)*rowGap;
    const sec=document.createElement('div'); sec.className='scn';
    sec.innerHTML=`<h2>${si+1}. ${sc.title}</h2><div class="sub">${sc.sub}</div>`;
    const flow=document.createElement('div'); flow.className='flow';
    const canvas=document.createElement('div'); canvas.className='canvas';
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    const rand=rng(si*97+13);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','links'); svg.setAttribute('width',W); svg.setAttribute('height',H);
    canvas.appendChild(svg);
    const pos=[];
    let stepIdx=0;
    rows.forEach((n,ri)=>{
      const gap=n>1?(W - 2*pad - n*cardW)/(n-1):0;
      const yBase=ri*(rowH+rowGap);
      for(let i=0;i<n;i++){
        const st=sc.steps[stepIdx++];
        const x=pad + i*(cardW+gap);
        const y=yBase + topPad + (i%2===0?0:oscil) + (rand()*6-3);
        const rot=(rand()*5-2.5).toFixed(2);
        pos.push({x,y,ri});
        const [emj,lbl,enc,stream,app,facilitator]=st; const s=STREAM[stream];
        const note=document.createElement('div'); note.className='note';
        note.style.left=x+'px'; note.style.top=y+'px'; note.style.width=cardW+'px';
        note.style.minHeight=cardH+'px'; note.style.background=s.bg;
        note.style.transform=`rotate(${rot}deg)`;
        note.innerHTML=
          `<div class="emj" style="font-size:${fEmj}px">${emj}</div>`+
          `<div class="lbl" style="font-size:${fLbl}px">${lbl}</div>`+
          `<div class="enc" style="font-size:${fEnc}px;color:${s.ac}">${enc}</div>`+
          `<div class="meta" style="font-size:${fMeta}px">Facilitator: ${facilitator||s.facilitator}</div>`+
          (app?`<div class="meta" style="font-size:${fMeta}px">App: ${app}</div>`:'')+
          `<span class="pill" style="font-size:${fPill}px;background:${s.ac}">${stream}</span>`;
        canvas.appendChild(note);
      }
    });
    for(let i=0;i<pos.length-1;i++){
      const a=pos[i], b=pos[i+1];
      const col=STREAM[sc.steps[i+1][3]].ac;
      if(a.ri===b.ri){
        drawArrow(svg, a.x+cardW, a.y+cardH/2, b.x, b.y+cardH/2, col, rand);
      } else {
        // wrap: soft ribbon from end of row down to start of next
        const x1=a.x+cardW*0.78, y1=a.y+cardH-2;
        const x2=b.x+cardW*0.28, y2=b.y-2;
        const rightOut=Math.min(W-10, a.x+cardW+52);
        const midY=y1+(y2-y1)*0.48;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',
          `M ${x1} ${y1} `+
          `C ${x1+34} ${y1+18}, ${rightOut} ${y1+30}, ${rightOut-6} ${midY} `+
          `S ${x2+52} ${y2-36}, ${x2} ${y2-12}`);
        path.setAttribute('fill','none');
        path.setAttribute('stroke',col); path.setAttribute('stroke-width','2.4');
        path.setAttribute('stroke-linecap','round'); path.setAttribute('stroke-linejoin','round');
        path.setAttribute('opacity','0.72');
        svg.appendChild(path);
        const ah=10, axp=x2, ayp=y2-4;
        const tri=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        tri.setAttribute('points',`${axp} ${ayp}, ${axp-ah*0.78} ${ayp-ah}, ${axp+ah*0.78} ${ayp-ah}`);
        tri.setAttribute('fill',col); tri.setAttribute('opacity','0.85');
        svg.appendChild(tri);
      }
    }
    flow.appendChild(canvas); sec.appendChild(flow); board.appendChild(sec);
  });
}
render();
let t; window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(render,120);});
</script>
</body>
</html>
